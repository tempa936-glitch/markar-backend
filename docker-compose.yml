version: "3.9"

# ─────────────────────────────────────────────────
# Markar Backend — Local Dev Stack
# Usage: docker compose up --build
# ─────────────────────────────────────────────────

services:

  # ── FastAPI App ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: markar-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=markar123
      - MARKAR_DEV_MODE=false
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./markar.db:/app/markar.db   # persist SQLite
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker ────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: markar-worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=markar123
      - MARKAR_DEV_MODE=false
      - CELERY_WORKERS=4
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis (Celery broker + result backend) ───────
  redis:
    image: redis:7-alpine
    container_name: markar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Neo4j (Code graph DB) ────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: markar-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/markar123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  neo4j_data:
  neo4j_logs: