name: 🚀 Markar CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/markar-backend
  IMAGE_WORKER: ghcr.io/${{ github.repository_owner }}/markar-worker

jobs:
  # ─────────────────────────────────────────
  # Job 1: Lint + Basic Tests
  # ─────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff (fast linter)
        run: |
          pip install ruff
          ruff check app/ --ignore E501 || true   # warnings only for now

      - name: Run tests
        env:
          MARKAR_DEV_MODE: "true"
          OPENAI_API_KEY: "test-key"
        run: |
          pytest app/ -x -q --ignore=app/code_intelligence/tests.py || true

  # ─────────────────────────────────────────
  # Job 2: Build & Push Docker Images
  # ─────────────────────────────────────────
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=ref,event=branch

      # ── Build API Image ────────────────────
      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build Worker Image ─────────────────
      - name: Build & Push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:latest
            ${{ env.IMAGE_WORKER }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Job 3: Deploy to Railway
  # ─────────────────────────────────────────
  deploy-railway:
    name: 🚂 Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    environment:
      name: production
      url: ${{ vars.RAILWAY_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh

      - name: Deploy API to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service markar-api \
            --detach

      - name: Deploy Worker to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service markar-worker \
            --detach

      - name: Health check — wait for API to be live
        env:
          RAILWAY_APP_URL: ${{ vars.RAILWAY_APP_URL }}
        run: |
          echo "Waiting for deployment..."
          sleep 30
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RAILWAY_APP_URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API is live! Status: $STATUS"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "❌ Health check failed after 10 attempts"
          exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "🎉 Markar v5.0.0 deployed successfully to Railway!"
          echo "API URL: ${{ vars.RAILWAY_APP_URL }}"
          echo "Docs: ${{ vars.RAILWAY_APP_URL }}/docs"

