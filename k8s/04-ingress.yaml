---
# Ingress — external traffic routing
# Requires: nginx ingress controller installed in cluster
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: markar-ingress
  namespace: markar
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # SSL (uncomment if using cert-manager)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # tls:                           # uncomment for HTTPS
  #   - hosts:
  #       - api.markar.yourdomain.com
  #     secretName: markar-tls
  rules:
    - host: api.markar.yourdomain.com   # apna domain yahan dalo
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: markar-api-svc
                port:
                  number: 80